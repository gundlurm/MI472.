<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Mahitha | Reach Out</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-info">
            <div class="container">
                <a class="navbar-brand" href="index.html">Mahitha Gundlur</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="about.html">About Us</a>
                    <a class="nav-link active" href="contact.html">Contact Us</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4">Contact Me</h1>
                <p class="text-center text-muted">Have a question about my research or want to discuss a data project? Send me a message below.</p>
                <hr>
                
                <form action="#" method="POST" class="p-4 border rounded shadow-sm bg-light">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="userName" placeholder="Enter your full name" required>
                    </div>

                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="userEmail" placeholder="example@msu.edu" required>
                        <small class="text-muted">I'll never share your email with anyone else.</small>
                    </div>

                    <div class="mb-3">
                        <label for="citySelect" class="form-label">City</label>
                        <select class="form-select" id="citySelect">
                            <option selected disabled>Select your location</option>
                            <option value="east-lansing">East Lansing</option>
                            <option value="auburn-hills">Auburn Hills</option>
                            <option value="detroit">Detroit</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="userMessage" class="form-label">Message Details</label>
                        <textarea class="form-control" id="userMessage" rows="5" placeholder="How can I help you?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-info text-white w-100 shadow-sm">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">Mahitha C. Gundlur | Michigan State University</p>
            <p class="mb-0">Email: <a href="mailto:gundlurm@msu.edu" class="text-info">gundlurm@msu.edu</a> | Phone: 517.442.0368</p>
        </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
