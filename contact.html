<!DOCTYPE html>
<html lang="en">
<head>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahitha Gundlur | Professional Portfolio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-info">
            <div class="container">
                <a class="navbar-brand" href="index.html">Mahitha Gundlur</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="about.html">About Us</a>
                    <a class="nav-link active" href="contact.html">Contact Us</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4 border-bottom pb-3">Contact Us</h1>
                
                <form action="#" method="POST" class="p-4 border rounded shadow-sm bg-light">
                    <div class="mb-3">
                        <label for="userName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="userName" placeholder="Enter your name" required>
                    </div>

                    <div class="mb-3">
                        <label for="userEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="userEmail" placeholder="email@msu.edu" required>
                        <small class="text-muted">We'll never share your email with anyone else.</small>
                    </div>

                    <div class="mb-3">
                        <label for="userPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="userPassword">
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block">Gender</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="genderOptions" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="genderOptions" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="citySelect" class="form-label">City</label>
                        <select class="form-select" id="citySelect">
                            <option selected>Select City</option>
                            <option value="east-lansing">East Lansing</option>
                            <option value="detroit">Detroit</option>
                            <option value="auburn-hills">Auburn Hills</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="userMessage" class="form-label">Put here short details</label>
                        <textarea class="form-control" id="userMessage" rows="4"></textarea>
                    </div>

                    <button type="submit" class="btn btn-info text-white w-100">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">Mahitha C. Gundlur | MSU College of Communication Arts and Sciences [cite: 4]</p>
            <p class="mb-0">Contact: <a href="mailto:gundlurm@msu.edu" class="text-info">gundlurm@msu.edu</a> | 517.442.0368 [cite: 3]</p>
        </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
